<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BM Project Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Top Bar -->
  <div class="top-bar">
    <button id="btnNewGroup">New Group</button>
    <button id="btnSave">Save</button>
    <button id="btnLoad">Load</button>
    <input type="file" id="jsonFileInput" style="display:none">

    <!-- 👇 Admin Login -->
    <button id="btnShowLogin">Login</button>
    <button id="btnLogout" style="display:none;">Logout</button>
  </div>

  <!-- Main Tracker Wrapper -->
  <div id="trackerWrapper" class="tracker-wrapper"></div>

  <!-- ===== Group Modal ===== -->
  <div id="groupModal" class="modal">
    <div class="modal-content">
      <h2>Edit Group</h2>
      <input id="groupNameInput" placeholder="Group Name">
      <div id="groupProjectList"></div>
      <div class="modal-buttons">
        <button id="btnGroupEditTeam">Edit Team</button>
        <button id="btnGroupNewProject">New Project</button>
        <button id="btnGroupSelectAll">Select All</button>
        <button id="btnGroupClearSelection">Clear</button>
        <button id="btnGroupExport">Export</button>
        <button id="btnGroupSave">Save</button>
        <button id="btnGroupDelete">Delete</button>
        <button id="btnGroupClose">Close</button>
      </div>
    </div>
  </div>

  <!-- ===== Project Modal ===== -->
  <div id="projectModal" class="modal">
    <div class="modal-content">
      <h2 id="projectModalTitle">Edit Project</h2>
      <input id="projectTitleInput" placeholder="Project Title">
      <input id="startDateInput" type="date">
      <input id="completionDateInput" type="date">
      <div id="milestoneList"></div>
      <input id="milestoneLabelInput" placeholder="Milestone Name">
      <input id="milestoneDateInput" type="date">
      <button id="milestoneSaveBtn">Add Milestone</button>
      <div class="modal-buttons">
        <button id="btnProjectSave">Save</button>
        <button id="btnProjectDelete">Delete</button>
        <button id="btnProjectClose">Close</button>
      </div>
    </div>
  </div>

  <!-- ===== Team Modal ===== -->
  <div id="teamModal" class="modal">
    <div class="modal-content">
      <h2>Edit Team</h2>
      <select id="roleSelect">
        <option value="TEAM_LEAD">TEAM LEAD</option>
        <option value="WELDER">WELDER</option>
        <option value="INSTALLER">INSTALLER</option>
        <option value="QC">QC</option>
      </select>
      <input id="memberName" placeholder="Member Name">
      <div id="memberList"></div>
      <div class="modal-buttons">
        <button id="btnTeamSave">Save</button>
        <button id="btnTeamClose">Close</button>
      </div>
    </div>
  </div>

  <!-- ===== Admin Login Modal ===== -->
  <div id="loginModal" class="modal">
    <div class="modal-content">
      <h2>Admin Login</h2>

      <label for="loginUser">Username:</label>
      <input type="text" id="loginUser" placeholder="Enter username">

      <label for="loginPass">Password:</label>
      <input type="password" id="loginPass" placeholder="Enter password">

      <div id="loginError" style="color:red; display:none; margin-top:6px;">
        Invalid login. Try again.
      </div>

      <div class="modal-buttons">
        <button id="btnLogin">Login</button>
        <button id="btnLoginCancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
